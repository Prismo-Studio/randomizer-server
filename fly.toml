app = "randomizer-server"
primary_region = "cdg"

[build]

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "5s"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

[[services]]
  internal_port = 38281
  protocol = "tcp"

  [[services.ports]]
    port = 38281
