app = "randomizer-server"
primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "5s"

[build]

[env]
  SKIP_REQUIREMENTS_UPDATE = "1"
  PYTHONDONTWRITEBYTECODE = "1"

# Keep the machine running, don't auto-suspend
[restart]
  policy = "always"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "5s"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

[[services]]
  internal_port = 38281
  protocol = "tcp"

  [[services.ports]]
    port = 38281
